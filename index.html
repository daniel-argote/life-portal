<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        // --- 1. PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = "https://prmxnxmmittjbhwwaajt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybXhueG1taXR0amJod3dhYWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjQ3MzYsImV4cCI6MjA4ODQ0MDczNn0.0gBC21T3mJhuFjumIIel_Hv9TvKlU8Y2Ug4EQeG11UM";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Icon component helper
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        ref.current.innerHTML = icon.toSvg({ size, class: className });
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex"></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('command');
            const [logs, setLogs] = useState([]);
            const [vault, setVault] = useState([]);
            const [input, setInput] = useState("");

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => setUser(session?.user ?? null));
                return () => subscription.unsubscribe();
            }, []);

            const fetchData = useCallback(async () => {
                if (!user) return;
                const { data: l } = await supabaseClient.from('logs').select('*').order('created_at', { ascending: false });
                const { data: v } = await supabaseClient.from('vault').select('*').order('updated_at', { ascending: false });
                setLogs(l || []); setVault(v || []);
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [user, fetchData]);

            const handleAuth = async (e) => {
                e.preventDefault();
                const email = e.target.email.value;
                const password = e.target.password.value;
                await supabaseClient.auth.signInWithPassword({ email, password });
            };

            const addLog = async () => {
                if (!input.trim()) return;
                await supabaseClient.from('logs').insert([{ content: input, user_id: user.id }]);
                setInput(""); fetchData();
            };

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <form onSubmit={handleAuth} className="w-full max-w-sm bg-white p-8 rounded-[2rem] shadow-xl space-y-4">
                        <h1 className="text-2xl font-extrabold text-center mb-6">Portal Login</h1>
                        <input name="email" type="email" placeholder="Email" className="w-full p-4 bg-slate-100 rounded-xl outline-none" required />
                        <input name="password" type="password" placeholder="Password" className="w-full p-4 bg-slate-100 rounded-xl outline-none" required />
                        <button className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">Enter</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 md:pl-64">
                    <aside className="fixed left-0 top-0 bottom-0 w-64 bg-white border-r hidden md:flex flex-col p-8">
                        <div className="font-black text-xl mb-12 text-indigo-600 flex items-center gap-2"><Icon name="LayoutDashboard" /> Portal</div>
                        <nav className="space-y-4 flex-1">
                            {['command', 'brain', 'log'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold ${tab === t ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400'}`}>
                                    <Icon name={t === 'command' ? 'LayoutDashboard' : t === 'brain' ? 'Brain' : 'BookText'} />
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => supabaseClient.auth.signOut()} className="text-slate-400 font-bold flex items-center gap-2 hover:text-red-500"><Icon name="LogOut" /> Exit</button>
                    </aside>

                    <main className="p-6 md:p-12 max-w-4xl mx-auto">
                        {tab === 'command' && (
                            <div className="space-y-6">
                                <h2 className="text-4xl font-black">Dashboard</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-indigo-600 p-8 rounded-[2rem] text-white">
                                        <div className="text-3xl font-black">{vault.length}</div>
                                        <div className="font-bold opacity-60">Vaulted Memories</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                                        <div className="text-3xl font-black">{logs.length}</div>
                                        <div className="font-bold text-slate-400">Daily Updates</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'log' && (
                            <div className="space-y-6">
                                <h2 className="text-3xl font-black">Daily Log</h2>
                                <div className="flex gap-2">
                                    <input value={input} onChange={e => setInput(e.target.value)} className="flex-1 p-4 bg-white border rounded-2xl outline-none shadow-sm" placeholder="What happened?" />
                                    <button onClick={addLog} className="bg-slate-900 text-white px-6 rounded-2xl"><Icon name="Plus" /></button>
                                </div>
                                <div className="space-y-4">
                                    {logs.map(l => (
                                        <div key={l.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center">
                                            <span className="font-bold text-slate-700">{l.content}</span>
                                            <span className="text-[10px] text-slate-300 font-bold">{new Date(l.created_at).toLocaleTimeString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <nav className="md:hidden fixed bottom-6 left-6 right-6 bg-slate-900 text-white rounded-[2rem] p-4 flex justify-around shadow-2xl">
                        {['command', 'brain', 'log'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={tab === t ? 'text-white' : 'text-slate-500'}>
                                <Icon name={t === 'command' ? 'LayoutDashboard' : t === 'brain' ? 'Brain' : 'BookText'} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
