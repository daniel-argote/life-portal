<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Life Portal</title>
    
    <!-- PWA & Mobile Meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading-screen" class="h-screen flex items-center justify-center flex-col gap-4">
            <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium tracking-tight">Initializing Neural Link...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
         // --- 1. PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = "https://prmxnxmmittjbhwwaajt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybXhueG1taXR0amJod3dhYWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjQ3MzYsImV4cCI6MjA4ODQ0MDczNn0.0gBC21T3mJhuFjumIIel_Hv9TvKlU8Y2Ug4EQeG11UM";

        // --- 2. INITIALIZATION ---
        const isConfigured = SUPABASE_URL && SUPABASE_URL.includes("supabase.co") && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.length > 20;

        let sb;
        if (isConfigured) {
            try {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                console.error("Client init error:", e);
            }
        }

        // Fixed Icon component for CDN usage
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    // Lucide CDN works best by targeting an element with data-lucide
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: {
                            stroke: 'currentColor',
                            'stroke-width': 2,
                            'stroke-linecap': 'round',
                            'stroke-linejoin': 'round',
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('command');
            const [authMode, setAuthMode] = useState('login');
            const [logs, setLogs] = useState([]);
            const [vault, setVault] = useState([]);
            const [input, setInput] = useState("");
            const [noteForm, setNoteForm] = useState({ title: '', content: '' });
            const [msg, setMsg] = useState(null);

            if (!isConfigured) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-center">
                        <div className="max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-red-50">
                            <h2 className="text-red-600 font-black text-2xl mb-4">Portal Offline</h2>
                            <p className="text-slate-500 font-medium mb-6">
                                Your Supabase Keys are missing. Open <b>index.html</b> and paste your credentials into lines 44 and 45.
                            </p>
                            <div className="bg-slate-50 p-4 rounded-2xl text-[10px] font-mono text-left break-all text-slate-400">
                                URL: {SUPABASE_URL || 'Not Set'}<br/>
                                KEY: {SUPABASE_ANON_KEY ? SUPABASE_ANON_KEY.substring(0, 15) + '...' : 'Not Set'}
                            </div>
                        </div>
                    </div>
                );
            }

            useEffect(() => {
                sb.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setLoading(false);
                });
                const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => subscription.unsubscribe();
            }, []);

            const fetchData = useCallback(async () => {
                if (!user) return;
                const { data: l } = await sb.from('logs').select('*').order('created_at', { ascending: false });
                const { data: v } = await sb.from('vault').select('*').order('updated_at', { ascending: false });
                setLogs(l || []); setVault(v || []);
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [user, fetchData]);

            const notify = (text, type = 'success') => {
                setMsg({ text, type });
                setTimeout(() => setMsg(null), 3000);
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                const email = e.target.email.value;
                const password = e.target.password.value;

                const { error } = authMode === 'login' 
                    ? await sb.auth.signInWithPassword({ email, password })
                    : await sb.auth.signUp({ email, password });

                if (error) notify(error.message, 'error');
                else if (authMode === 'signup') notify("Account created! Log in now.", "success");
                setLoading(false);
            };

            const addLog = async () => {
                if (!input.trim()) return;
                const { error } = await sb.from('logs').insert([{ content: input, user_id: user.id }]);
                if (!error) { setInput(""); fetchData(); notify("Logged"); }
                else notify("Save failed: Check database tables", "error");
            };

            const addNote = async () => {
                if (!noteForm.title.trim()) return;
                const { error } = await sb.from('vault').insert([{ ...noteForm, user_id: user.id }]);
                if (!error) { setNoteForm({ title: '', content: '' }); fetchData(); notify("Vaulted"); }
                else notify("Save failed", "error");
            };

            const deleteItem = async (table, id) => {
                await sb.from(table).delete().eq('id', id);
                fetchData();
            };

            if (loading && !user) return null;

            if (!user) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-white fade-in">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-12">
                            <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] mx-auto flex items-center justify-center text-white shadow-2xl shadow-indigo-100 mb-6">
                                <Icon name="layout-dashboard" size={36} />
                            </div>
                            <h1 className="text-4xl font-black tracking-tighter">Life Portal</h1>
                            <p className="text-slate-400 mt-2 font-bold uppercase tracking-widest text-[10px]">Neural Interface v2.0</p>
                        </div>

                        <form onSubmit={handleAuth} className="space-y-4">
                            <input name="email" type="email" placeholder="Identity Email" className="w-full px-6 py-5 bg-slate-50 border border-slate-100 rounded-[1.5rem] outline-none focus:ring-2 focus:ring-indigo-600 font-bold" required />
                            <input name="password" type="password" placeholder="Access Key" className="w-full px-6 py-5 bg-slate-50 border border-slate-100 rounded-[1.5rem] outline-none focus:ring-2 focus:ring-indigo-600 font-bold" required />
                            <button type="submit" className="w-full bg-slate-900 text-white font-bold py-5 rounded-[1.5rem] shadow-xl hover:bg-black transition-all active:scale-95">
                                {authMode === 'login' ? 'Authenticate' : 'Register Identity'}
                            </button>
                        </form>

                        <div className="mt-10 text-center">
                            <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="text-indigo-600 font-black text-sm uppercase tracking-widest hover:text-indigo-800">
                                {authMode === 'login' ? "Request New Access" : "Existing Identity? Login"}
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen md:pl-64 pb-20 md:pb-0 fade-in">
                    {msg && <div className={`fixed top-6 right-6 z-[100] px-8 py-4 rounded-2xl text-white font-black shadow-2xl animate-in slide-in-from-top-4 duration-300 ${msg.type === 'error' ? 'bg-red-500' : 'bg-slate-900'}`}>{msg.text}</div>}

                    {/* Sidebar */}
                    <aside className="fixed left-0 top-0 bottom-0 w-64 bg-white border-r border-slate-100 hidden md:flex flex-col p-8">
                        <div className="font-black text-2xl mb-12 text-indigo-600 flex items-center gap-3 tracking-tighter">
                            <Icon name="layout-dashboard" size={24} /> Portal
                        </div>
                        <nav className="space-y-2 flex-1">
                            {[
                                { id: 'command', icon: 'layout-dashboard', label: 'Command' },
                                { id: 'brain', icon: 'brain', label: 'Brain' },
                                { id: 'log', icon: 'book-text', label: 'Log' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setTab(t.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-[1.25rem] font-bold transition-all ${tab === t.id ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={t.icon} />
                                    {t.label}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => sb.auth.signOut()} className="text-slate-300 font-bold flex items-center gap-3 px-5 py-4 hover:text-red-500 transition-colors"><Icon name="log-out" /> Sign Out</button>
                    </aside>

                    <main className="p-6 md:p-16 max-w-5xl mx-auto">
                        {tab === 'command' && (
                            <div className="space-y-10">
                                <header>
                                    <h2 className="text-5xl font-black tracking-tighter">Command</h2>
                                    <p className="text-slate-400 font-bold mt-2 uppercase tracking-widest text-[10px]">Status: Operational</p>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-indigo-600 p-10 rounded-[3rem] text-white shadow-2xl shadow-indigo-100">
                                        <div className="text-5xl font-black mb-2">{vault.length}</div>
                                        <div className="font-bold opacity-60 uppercase tracking-widest text-xs">Knowledge Links</div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                                        <div className="text-5xl font-black mb-2">{logs.length}</div>
                                        <div className="font-bold text-slate-300 uppercase tracking-widest text-xs">Activity Logs</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'brain' && (
                            <div className="space-y-8">
                                <h2 className="text-4xl font-black tracking-tight">Second Brain</h2>
                                <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm space-y-4">
                                    <input className="w-full text-2xl font-black outline-none placeholder:text-slate-200" placeholder="Focus Title" value={noteForm.title} onChange={e => setNoteForm({...noteForm, title: e.target.value})} />
                                    <textarea className="w-full h-40 outline-none text-slate-500 font-medium resize-none text-lg placeholder:text-slate-200" placeholder="Capture details..." value={noteForm.content} onChange={e => setNoteForm({...noteForm, content: e.target.value})} />
                                    <div className="flex justify-end pt-4"><button onClick={addNote} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Vault Data</button></div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    {vault.map(v => (
                                        <div key={v.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-50 shadow-sm group hover:shadow-md transition-all">
                                            <div className="flex justify-between items-start mb-4">
                                                <h4 className="font-black text-xl text-slate-800">{v.title}</h4>
                                                <button onClick={() => deleteItem('vault', v.id)} className="opacity-0 group-hover:opacity-100 text-slate-200 hover:text-red-500 transition-all"><Icon name="trash-2" size={18} /></button>
                                            </div>
                                            <p className="text-slate-500 font-medium whitespace-pre-wrap text-sm leading-relaxed">{v.content}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'log' && (
                            <div className="space-y-10 max-w-2xl mx-auto">
                                <h2 className="text-4xl font-black text-center">Daily Log</h2>
                                <div className="relative">
                                    <input value={input} onChange={e => setInput(e.target.value)} className="w-full pl-8 pr-24 py-6 bg-white border border-slate-100 rounded-[2.5rem] outline-none shadow-xl shadow-slate-200/50 font-bold text-lg" placeholder="New update..." onKeyPress={e => e.key === 'Enter' && addLog()} />
                                    <button onClick={addLog} className="absolute right-3 top-3 bottom-3 aspect-square bg-slate-900 text-white rounded-[1.8rem] flex items-center justify-center hover:bg-black transition-all active:scale-95"><Icon name="plus" size={28} /></button>
                                </div>
                                <div className="space-y-6 relative before:absolute before:left-4 before:top-4 before:bottom-4 before:w-0.5 before:bg-slate-100">
                                    {logs.map(l => (
                                        <div key={l.id} className="group relative pl-12">
                                            <div className="absolute left-0 top-6 w-8 h-8 rounded-full bg-white border-4 border-[#F8FAFC] shadow-sm flex items-center justify-center">
                                                <div className="w-2 h-2 rounded-full bg-indigo-600"></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-[2rem] border border-slate-100 flex justify-between items-center group shadow-sm transition-all hover:shadow-md">
                                                <div>
                                                    <p className="font-bold text-slate-700 text-lg leading-tight">{l.content}</p>
                                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest mt-2 block">{new Date(l.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                                </div>
                                                <button onClick={() => deleteItem('logs', l.id)} className="opacity-0 group-hover:opacity-100 text-slate-200 hover:text-red-500 transition-all"><Icon name="trash-2" size={16} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Mobile Navigation */}
                    <nav className="md:hidden fixed bottom-6 left-6 right-6 glass-nav rounded-[2.5rem] p-2 flex justify-around shadow-2xl z-50 border border-white">
                        {[
                            { id: 'command', icon: 'layout-dashboard' },
                            { id: 'brain', icon: 'brain' },
                            { id: 'log', icon: 'book-text' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`p-4 rounded-[2rem] transition-all ${tab === t.id ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                <Icon name={t.icon} size={24} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
