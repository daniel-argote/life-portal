<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Life Portal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 1. PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = "https://prmxnxmmittjbhwwaajt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybXhueG1taXR0amJod3dhYWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjQ3MzYsImV4cCI6MjA4ODQ0MDczNn0.0gBC21T3mJhuFjumIIel_Hv9TvKlU8Y2Ug4EQeG11UM";
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    const icon = window.lucide.icons[name];
                    if (icon) ref.current.innerHTML = icon.toSvg({ size, class: className });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('command');
            const [authMode, setAuthMode] = useState('login'); // 'login' or 'signup'
            const [logs, setLogs] = useState([]);
            const [vault, setVault] = useState([]);
            const [input, setInput] = useState("");
            const [noteForm, setNoteForm] = useState({ title: '', content: '' });
            const [msg, setMsg] = useState(null);

            useEffect(() => {
                sb.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setLoading(false);
                });
                const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => subscription.unsubscribe();
            }, []);

            const fetchData = useCallback(async () => {
                if (!user) return;
                const { data: l } = await sb.from('logs').select('*').order('created_at', { ascending: false });
                const { data: v } = await sb.from('vault').select('*').order('updated_at', { ascending: false });
                setLogs(l || []); setVault(v || []);
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [user, fetchData]);

            const notify = (text, type = 'success') => {
                setMsg({ text, type });
                setTimeout(() => setMsg(null), 3000);
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                const email = e.target.email.value;
                const password = e.target.password.value;

                const { error } = authMode === 'login' 
                    ? await sb.auth.signInWithPassword({ email, password })
                    : await sb.auth.signUp({ email, password });

                if (error) notify(error.message, 'error');
                else if (authMode === 'signup') notify("Account created! Check email if required.", "success");
                setLoading(false);
            };

            const addLog = async () => {
                if (!input.trim()) return;
                const { error } = await sb.from('logs').insert([{ content: input, user_id: user.id }]);
                if (!error) { setInput(""); fetchData(); notify("Logged"); }
            };

            const addNote = async () => {
                if (!noteForm.title.trim()) return;
                const { error } = await sb.from('vault').insert([{ ...noteForm, user_id: user.id }]);
                if (!error) { setNoteForm({ title: '', content: '' }); fetchData(); notify("Vaulted"); }
            };

            const deleteItem = async (table, id) => {
                await sb.from(table).delete().eq('id', id);
                fetchData();
            };

            if (loading && !user) return <div className="h-screen flex items-center justify-center text-slate-400">Loading Portal...</div>;

            if (!user) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-white">
                    <div className="w-full max-w-sm fade-in">
                        <div className="text-center mb-10">
                            <div className="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white shadow-xl mb-4">
                                <Icon name="LayoutDashboard" size={32} />
                            </div>
                            <h1 className="text-3xl font-extrabold tracking-tight">Life Portal</h1>
                            <p className="text-slate-400 mt-2">{authMode === 'login' ? 'Welcome back' : 'Register your identity'}</p>
                        </div>

                        <form onSubmit={handleAuth} className="space-y-4">
                            <input name="email" type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-600 transition-all" required />
                            <input name="password" type="password" placeholder="Password" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-600 transition-all" required />
                            <button type="submit" className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-black transition-all">
                                {authMode === 'login' ? 'Sign In' : 'Create Account'}
                            </button>
                        </form>

                        <div className="mt-8 pt-6 border-t border-slate-100 text-center">
                            <button 
                                onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}
                                className="text-indigo-600 font-bold hover:underline"
                            >
                                {authMode === 'login' ? "Don't have an account? Create one" : "Already have an account? Sign in"}
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen md:pl-64 pb-20 md:pb-0">
                    {msg && <div className={`fixed top-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-bold shadow-2xl fade-in ${msg.type === 'error' ? 'bg-red-500' : 'bg-slate-900'}`}>{msg.text}</div>}

                    {/* Desktop Sidebar */}
                    <aside className="fixed left-0 top-0 bottom-0 w-64 bg-white border-r hidden md:flex flex-col p-8">
                        <div className="font-black text-xl mb-12 text-indigo-600 flex items-center gap-2"><Icon name="LayoutDashboard" /> Portal</div>
                        <nav className="space-y-2 flex-1">
                            {['command', 'brain', 'log'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold transition-all ${tab === t ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={t === 'command' ? 'LayoutDashboard' : t === 'brain' ? 'Brain' : 'BookText'} />
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => sb.auth.signOut()} className="text-slate-400 font-bold flex items-center gap-2 hover:text-red-500"><Icon name="LogOut" /> Exit Portal</button>
                    </aside>

                    <main className="p-6 md:p-12 max-w-4xl mx-auto fade-in">
                        {tab === 'command' && (
                            <div className="space-y-8">
                                <h2 className="text-4xl font-black tracking-tight">System Status</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-indigo-600 p-8 rounded-[2rem] text-white shadow-xl">
                                        <div className="text-4xl font-black mb-1">{vault.length}</div>
                                        <div className="font-bold opacity-70">Knowledge Links</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border border-slate-200">
                                        <div className="text-4xl font-black mb-1">{logs.length}</div>
                                        <div className="font-bold text-slate-400">Momentum Logs</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'brain' && (
                            <div className="space-y-6">
                                <h2 className="text-3xl font-black">Second Brain</h2>
                                <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm space-y-4">
                                    <input className="w-full text-xl font-bold outline-none" placeholder="Title" value={noteForm.title} onChange={e => setNoteForm({...noteForm, title: e.target.value})} />
                                    <textarea className="w-full h-32 outline-none text-slate-500 resize-none" placeholder="Notes..." value={noteForm.content} onChange={e => setNoteForm({...noteForm, content: e.target.value})} />
                                    <div className="flex justify-end"><button onClick={addNote} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Vault Link</button></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {vault.map(v => (
                                        <div key={v.id} className="bg-white p-6 rounded-3xl border border-slate-100 group">
                                            <div className="flex justify-between items-start mb-2"><h4 className="font-bold">{v.title}</h4><button onClick={() => deleteItem('vault', v.id)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={16} /></button></div>
                                            <p className="text-slate-500 text-sm">{v.content}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'log' && (
                            <div className="space-y-6 max-w-xl mx-auto">
                                <h2 className="text-3xl font-black text-center">Daily Log</h2>
                                <div className="flex gap-2">
                                    <input value={input} onChange={e => setInput(e.target.value)} className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl outline-none shadow-sm" placeholder="Current update..." onKeyPress={e => e.key === 'Enter' && addLog()} />
                                    <button onClick={addLog} className="bg-slate-900 text-white px-6 rounded-2xl hover:bg-black"><Icon name="Plus" /></button>
                                </div>
                                <div className="space-y-4">
                                    {logs.map(l => (
                                        <div key={l.id} className="flex gap-4">
                                            <div className="w-1 bg-indigo-100 rounded-full"></div>
                                            <div className="flex-1 bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center group">
                                                <div><p className="font-bold text-slate-700">{l.content}</p><span className="text-[10px] font-bold text-slate-300 uppercase">{new Date(l.created_at).toLocaleTimeString()}</span></div>
                                                <button onClick={() => deleteItem('logs', l.id)} className="opacity-0 group-hover:opacity-100 text-slate-200 hover:text-red-500"><Icon name="Trash2" size={16} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Mobile Navigation */}
                    <nav className="md:hidden fixed bottom-6 left-6 right-6 bg-slate-900 text-white rounded-[2rem] p-4 flex justify-around shadow-2xl z-50">
                        {['command', 'brain', 'log'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={tab === t ? 'text-white' : 'text-slate-500'}>
                                <Icon name={t === 'command' ? 'LayoutDashboard' : t === 'brain' ? 'Brain' : 'BookText'} size={24} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
